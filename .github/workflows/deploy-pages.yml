name: Deploy renderer to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Stamp build version
        id: stamp
        shell: bash
        run: |
          version="$(date -u +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "TMDS_BUILD_VERSION=$version" >> "$GITHUB_ENV"

      - name: Build renderer
        run: npm run build:renderer
        env:
          TMDS_BUILD_VERSION: ${{ steps.stamp.outputs.version }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/renderer

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
